year: 1967
era: founding
event: "Herbert Simon coins the term 'learning engineer' in 'The Job of a College President'"
significance: >
  The founding document of the field. Simon argued that content expertise does
  not equal expertise in facilitating learning, and proposed dedicated
  professionals — learning engineers — to design evidence-based learning
  experiences. Published in Educational Record, 48(1), 68–78.
actors:
  - "Herbert A. Simon"
