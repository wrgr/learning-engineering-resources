event: "Ann Brown publishes 'Design Experiments' in Journal of the Learning Sciences"
significance: >
  Established design-based research as the methodological framework for testing
  engineered learning interventions in authentic classroom settings. Over 2,800
  citations; most influential paper in JLS history. Became the basis for how
  learning engineers validate systems in the wild.
actors:
  - "Ann L. Brown"
references:
