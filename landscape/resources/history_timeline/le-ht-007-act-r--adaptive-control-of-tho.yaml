event: "ACT-R (Adaptive Control of Thought—Rational) theory formalized by John Anderson"
significance: >
  ACT-R provided a unified cognitive architecture distinguishing declarative
  from procedural memory and specifying how practice drives skill acquisition.
  Became the theoretical backbone for Cognitive Tutors and much of the ITS
  field.
actors:
  - "John R. Anderson"
references:
