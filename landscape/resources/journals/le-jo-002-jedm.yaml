description: >
  Open-access journal dedicated to algorithms and methodologies for analyzing
  educational data: knowledge tracing, automated feature engineering, predictive
  student modeling, and behavioral analysis. Baker & Yacef's founding
  codification of the EDM field (2009) was published here, establishing the
  taxonomy of methods that still organizes the community.

  Premier venue for computational learning engineering methods. Diamond open
  access — no fees for authors or readers. For LE practitioners developing or
  evaluating data-driven components, JEDM provides the most rigorous algorithmic
  benchmarks and the broadest survey of available methods.
notes: "Diamond open access. Baker & Yacef (2009) 'The State of Educational Data Mining' is the field-defining survey paper."
