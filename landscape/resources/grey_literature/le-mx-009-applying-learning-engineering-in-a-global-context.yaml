significance: An Invitation of Learning Engineering held on February 25, 2026, explored how learning engineering
  is adapted globally in a local context. Hosted by the Globalisation Special Interest Group, Carolina
  Ali Fojaco, Chief Learning Officer at Project Alianza, provided a deep dive on how they used learning
  engineering to iterate and scale AnGo, an offline, AI-assisted literacy app to help children in Central
  America build foundational reading skills.
