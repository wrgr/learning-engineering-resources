significance: >
  The authoritative evidence standards framework for evaluating education research. Specifies the
  criteria an intervention study must meet to be considered high-quality evidence (randomized
  design, statistical power, attrition standards). Sets the evidentiary bar that LE evaluation
  must meet to influence policy and procurement decisions.
