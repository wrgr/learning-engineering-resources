significance: >
  National Academies report synthesizing research on integrating human factors into the system
  development process. Provides the HSI framework (human factors engineering, manpower, personnel,
  training, safety) that LE borrows when treating learning as a human-system performance problem.
  Foundational for LE practitioners working in defense and complex system contexts.
