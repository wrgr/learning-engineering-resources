significance: >
  DoD policy governing the design, management, and delivery of distributed (technology-based)
  learning for military training. Mandates ADDIE-based instructional systems design, learning
  objective taxonomies, and evaluation standards. The governance framework for LE deployment
  across the largest single training system in the world.
