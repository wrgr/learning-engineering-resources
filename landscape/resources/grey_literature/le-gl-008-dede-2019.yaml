significance: >
  First book-length treatment of learning engineering applied to digital and distributed contexts.
  Saxberg's formulation — LE as applying learning science at 'massive, affordable, data-rich scale'
  — became widely adopted. Documents how online architectures enable continuous telemetry that
  peer-reviewed journals document years later.
