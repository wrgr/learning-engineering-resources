significance: >
  FAA advisory circular defining standards for Crew Resource Management (CRM) training programs.
  CRM training is one of the most rigorous evidence-based training programs ever deployed at
  scale — a landmark case study in applying learning science to high-stakes professional training.
  Directly relevant to LE practitioners in aviation, healthcare simulation, and safety-critical
  training domains.
