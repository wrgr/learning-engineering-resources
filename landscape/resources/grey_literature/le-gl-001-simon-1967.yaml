significance: >
  The founding document of learning engineering. Simon coined the term 'learning engineer'
  and argued that teaching effectiveness is a domain of expertise distinct from subject-matter
  knowledge, requiring its own scientific foundation in cognitive science. The philosophical
  and historical origin of everything in the field.
