description: >
  Flagship open infrastructure for LE research globally. Comprises DataShop
  (data repository), LearnSphere (analytics infrastructure), CTAT (cognitive
  tutor authoring tools), OLI (courseware), DiscourseDB (NLP for learning),
  LightSide (automated text coding), and Bazaar (intelligent collaborative
  chatbot). Enables researchers to build, test, and study LE systems without
  proprietary infrastructure.
