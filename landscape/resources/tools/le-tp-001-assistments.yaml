  teachers, primarily for mathematics. Large research base; built-in E-TRIALS
  functionality enabling randomized controlled experiments at scale in live
  classrooms. Pioneered teacher-authored hint sequences and demonstrated that
  formative assessment integrated with intelligent hints produces significant
  learning gains.
