description: >
  Open-source framework for creating interactive learning content (quizzes,
  interactive video, branching scenarios, simulations) that runs in any browser
  and LMS. Widely used in LE for rapid prototyping of formative assessment and
  interactive instruction. Integration with Moodle, Canvas, Brightspace, and
  WordPress makes it accessible to practitioners at all technical levels.
