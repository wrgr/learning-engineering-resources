description: >
  Academic home of learning sciences and technologies at CMU. Houses Ken
  Koedinger, Al Corbett, and the PACT Center. Offers PhD and MS programs
  integrating HCI, learning sciences, and data science. Co-originator of
  learning engineering as a named field.

  Home of DataShop, CTAT (Cognitive Tutor Authoring Tools), and the Cognitive
  Tutor research lineage — among the most replicated bodies of evidence in
  applied learning science. The HCII is the primary academic source of the
  methodological and theoretical frameworks that define learning engineering as
  a discipline.
notes: "Houses Koedinger, Corbett, and the PACT Center; co-originator of learning engineering as a named discipline."
