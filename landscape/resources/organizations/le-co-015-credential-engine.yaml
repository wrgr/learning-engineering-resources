description: >
  Open-source data standard and registry for describing credentials, competencies,
  and learning pathways. The Credential Transparency Description Language (CTDL)
  encodes 1,200+ properties for representing what people know and can do, enabling
  machine-readable linkages between learning experiences, competencies, and
  credentials across providers and platforms.

  The emerging national infrastructure for credential-level knowledge
  representation in competency-based learning engineering systems. For LE
  practitioners designing workforce-aligned learning systems, CTDL provides
  the shared ontology needed to map learning outcomes to job requirements and
  to stack credentials into coherent pathways at scale.
notes: "CTDL is the primary open standard for machine-readable credential and competency representation in the US."
