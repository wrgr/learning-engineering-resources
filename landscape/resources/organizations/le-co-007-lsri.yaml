description: >
  Interdisciplinary research institute at the University of Illinois Chicago
  spanning learning sciences, computational methods, and educational equity.
  Conducts research that bridges theoretical learning science and applied
  educational intervention, with particular attention to equity and access
  in urban educational contexts.

  LSRI provides a model for LE research that integrates rigorous methodology
  with a commitment to socially situated, equity-centered approaches — an
  important counterweight to purely technocentric conceptions of the field.
