description: >
  Academic society organizing the annual ICLS (International Conference of the
  Learning Sciences) and CSCL (Computer-Supported Collaborative Learning)
  conferences. Bridges learning science theory and instructional design practice.
  Emphasizes socio-cultural and humanistic perspectives alongside computational
  approaches.

  Essential for grounding algorithmic LE systems in rich theories of how people
  learn in social and institutional contexts. ISLS conferences are where
  learning scientists and education researchers most directly interrogate the
  assumptions embedded in AI and data-driven learning systems.
notes: "Organizes ICLS and CSCL conferences; the primary society for learning sciences as an academic discipline."
