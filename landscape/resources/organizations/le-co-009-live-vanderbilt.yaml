description: >
  Peabody College incubator supporting interdisciplinary learning innovation at
  Vanderbilt University. Brings together researchers, designers, and technologists
  to develop and evaluate novel learning systems, with emphasis on evidence-based
  design and emerging AI applications.

  Vanderbilt LIVE teams participate in national AI-for-learning efforts, including
  AI-ALOE partner work on intelligent text and workplace learning tools. The
  incubator model — rapid prototyping with embedded evaluation — exemplifies the
  learning engineering design cycle applied at a research university.
notes: "AI-ALOE consortium partner; Peabody College, Vanderbilt."
