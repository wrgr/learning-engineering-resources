description: >
  Research center at the University of Pennsylvania directing educational data
  mining and learning engineering policy work, led by Ryan Baker. Produced the
  influential 'High-Leverage Opportunities for Learning Engineering' report (2021),
  which mapped priority areas for the field.

  Baker serves as editor of the Journal of Educational Data Mining and is a primary
  organizer of the EDM conference. The center bridges computational EDM methods
  with applied learning engineering, making it a key node in the national LE
  policy conversation.
notes: "Ryan Baker, PI; produced 'High-Leverage Opportunities for Learning Engineering' (2021)."
