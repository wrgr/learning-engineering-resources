description: 'Professor of Learning and Artificial Intelligence at UCL. General Chair of LAK 2024 (Kyoto) and Program
  Chair of LAK 2026 (Bergen). Research focuses on human-AI complementarity in learning, multimodal learning analytics,
  and the design of AI systems that augment rather than replace teachers.

  '
key_contributions:
- General Chair, LAK 2024 (Kyoto); Program Chair, LAK 2026 (Bergen)
- Articulated 'human-AI complementarity' framing for educational AI design
- Pioneering work on multimodal learning analytics capturing behavioral, physiological, and discursive data
- UCL-based bridge between European AI policy research and the LA community
