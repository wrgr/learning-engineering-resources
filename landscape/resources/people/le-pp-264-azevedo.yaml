description: 'Professor at the University of Central Florida. Program Chair for LAK 2026. Long-standing leader in
  research on self-regulated learning, metacognition, and multimodal/multichannel data for adaptive learning systems
  — with influential work using eye-tracking, physiological sensing, and log data to model learner state.

  '
key_contributions:
- Program Chair, LAK 2026 (Bergen, Norway)
- Established multi-channel, multimodal data analysis as a core method for studying self-regulated learning
- Developed MetaTutor and related systems that detect and scaffold metacognitive processes
- Trained generations of learning analytics and educational-psychology PhDs now leading the field
