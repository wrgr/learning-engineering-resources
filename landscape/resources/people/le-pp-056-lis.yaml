role: LE competency framework developer; ICICLE CCC and Globalisation/Localisation SIG co-chair
description: >
  Co-chair of the Competencies, Credentials and Curriculum (CCC) SIG and the
  Globalisation/Localisation SIG within IEEE ICICLE. Develops practitioner competency
  frameworks for the learning engineering profession and works to adapt LE methods for
  international and multilingual contexts.
key_contributions:
  - Co-chairs the CCC SIG, developing competency and credential frameworks that define what a learning engineer must know and be able to do
  - Co-chairs the Globalisation/Localisation SIG, advancing culturally responsive adaptation of LE curricula and frameworks
  - Contributes to IEEE ICICLE Body of Knowledge chapters on competencies and professional development
  - Bridges international LE communities with ICICLE's standards and certification efforts
key_works:
  - "ICICLE Body of Knowledge — CCC chapter contributions"
  - "IEEE ICICLE Globalisation/Localisation SIG working papers"
