  mapping concept dependencies from student performance data in large MIT engineering courses.

  '
key_contributions:
- Directs the MIT LEAP group, applying data science and LE methods to engineering curriculum improvement at scale
- Developed methods for identifying prerequisite gaps and concept dependency structures from student performance
