role: Co-developer of Bayesian Knowledge Tracing; ITS architecture pioneer
description: 'Co-developer of Bayesian Knowledge Tracing (BKT), the dominant probabilistic student model in ITS.
  Co-designed the ACT Programming Tutor and Algebra Cognitive Tutor with Anderson and Koedinger. Known for systematic
  empirical work on learning curves, error analysis, and mastery criteria in cognitive tutors.

  '
key_contributions:
- Co-developed Bayesian Knowledge Tracing (BKT), the dominant probabilistic student model in ITS
- Co-designed the ACT Programming Tutor and Algebra Cognitive Tutor with Anderson and Koedinger
- Systematic empirical work on learning curves, error analysis, and mastery criteria in cognitive tutors
- Established methods for validating ITS student models against controlled study outcomes
key_works:
- Intelligent tutoring systems (with Koedinger & Anderson, HCI Handbook, 1997)
- 'Knowledge Tracing: Modeling the Acquisition of Procedural Knowledge (User Modeling and User-Adapted Interaction,
  1994)'
- 'Cognitive tutors : technology bringing learning science to the classroom (HAL (Le Centre pour la Communication
  Scientifique Directe), 2006)'
- 'Cognitive Tutors: Lessons Learned (Journal of the Learning Sciences, 1995)'
- Off-task behavior in the cognitive tutor classroom (2004)
