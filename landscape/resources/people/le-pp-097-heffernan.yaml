description: 'Director of Learning Sciences and Technologies at WPI and creator of ASSISTments, a free ITS serving
  500,000+ students and 20,000+ teachers. Built E-TRIALS within ASSISTments — a platform for running randomized
  controlled experiments at scale in real classrooms. Pioneered ''crowdsourcing'' of instructional design through
  teacher-authored hint sequences.

  '
key_contributions:
- Created ASSISTments, a free ITS serving 500,000+ students and 20,000+ teachers
- Built E-TRIALS within ASSISTments — a platform for running randomized controlled experiments at scale in real
  classrooms
- Pioneered the 'crowdsourcing' of instructional design through teacher-authored hint sequences in ASSISTments
- Demonstrated that formative assessment integrated with intelligent hints improves learning outcomes significantly
- Research spans educational data mining, learning analytics, and optimization of student learning pathways
- Program Co-Chair, ACM Learning @ Scale 2025 (Palermo, Italy)
