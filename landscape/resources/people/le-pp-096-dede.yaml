role: Pioneer of immersive learning environments; hybrid education researcher
description: >
  Pioneer of immersive learning environments and hybrid education. 'Immersive interfaces
  for engagement and learning' (Science, 2009) has thousands of citations. Co-edited
  Learning Engineering for Online Education (Routledge, 2019) — the field's first major
  book. Post-pandemic work framed hybrid learning not as emergency measure but as optimal
  future state. Directed multiple NSF and DoE grants applying LE principles to K-12 and
  higher education.
