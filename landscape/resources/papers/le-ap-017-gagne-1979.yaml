significance: >
  The foundational text systematizing instructional design as an engineering discipline.
  Gagné's nine events of instruction and taxonomy of learning outcomes remain standard
  scaffolding for LE system design. Established the principle that instructional sequences
  must be derived from analysis of the target learning outcomes, not from subject-matter
  structure alone.
