significance: >
  Showed that students using a cognitive tutor who were prompted to self-explain their steps
  significantly outperformed students who practiced without explanation prompts. Established
  self-explanation prompting as a core ITS design feature and provided strong evidence for
  metacognitive scaffolding in adaptive learning systems.
