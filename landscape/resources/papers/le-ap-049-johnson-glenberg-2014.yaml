significance: >
  Demonstrated that embodied interaction (gesture and motion capture) in mixed-reality
  science simulations produces stronger learning gains than equivalent content in
  non-embodied digital formats. Provided empirical support for embodied cognition
  principles in LE system design, with direct implications for XR/AR-based learning
  environments and the design of physical interaction as a learning mechanism.
