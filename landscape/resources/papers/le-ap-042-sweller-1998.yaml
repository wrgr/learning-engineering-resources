significance: >
  Presented a comprehensive formulation of Cognitive Load Theory (CLT) integrating
  intrinsic, extraneous, and germane cognitive load with human cognitive architecture.
  Derived specific instructional design prescriptions — worked examples, split-attention
  effect, redundancy effect, expertise reversal — that became standard in multimedia
  learning and ITS design. Essential theoretical foundation for LE decisions about
  interface design, instructional sequencing, and adaptive difficulty.
