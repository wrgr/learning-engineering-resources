significance: >
  The foundational text on case-based reasoning (CBR) as a problem-solving paradigm,
  in which new problems are solved by adapting solutions from similar past cases.
  Kolodner's CBR framework directly informed the architecture of case-based learning
  environments such as Environments for Reasoning Under Uncertainty (ERU) and
  Learning by Design, and continues to underpin LE systems using scenario-based
  and example-based instructional approaches.
