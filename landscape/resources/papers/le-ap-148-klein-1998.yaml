significance: >
  Presented the Recognition-Primed Decision (RPD) model based on naturalistic observations of
  expert decision-making under uncertainty — experts recognize situation patterns and mentally
  simulate options rather than comparing alternatives analytically. Foundational for LE design
  of decision-making training, scenario-based simulations, and expertise development programs
  in high-stakes domains.
