significance: >
  Demonstrated that student-generated contrasting cases (exploratory analysis of two
  data sets) before direct instruction produced significantly deeper understanding than
  direct instruction alone. Established the "time for telling" principle — direct
  instruction is most effective after learners have been prepared by generative
  problem-solving. Foundational for LE sequencing design and productive failure research.
