title: "The Classroom as a Dashboard: Co-designing Wearable Cognitive Augmentation for K-12 Teachers"
authors:
  - Kenneth Holstein
  - Bruce M. McLaren
  - Vincent Aleven
year: 2018
venue: "Proceedings of the 8th International Conference on Learning Analytics and Knowledge"
pages: "79–88"
doi: "10.1145/3170358.3170377"
tier: contemporary
citation_count_approx: 210
significance: >
  Co-designed a teacher-facing real-time analytics dashboard (wearable + visual) that
  surfaces individual student difficulty in classrooms using ITS. Field study showed
  teachers using the dashboard changed instructional behavior and improved targeted
  support. Pioneered the concept of AI-augmented teachers and is foundational for
  LE systems that position AI as a teacher assistant rather than a replacement.
