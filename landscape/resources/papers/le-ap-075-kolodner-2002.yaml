significance: >
  Reported outcomes and design principles from Learning by Design (LBD), a
  project-based science curriculum that uses design challenges to motivate inquiry
  and content learning. Demonstrated that design-challenge framing improves science
  content knowledge and design process skills. Foundational for LE systems using
  challenge-based learning and project-based approaches.
