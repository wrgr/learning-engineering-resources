significance: >
  Introduced the "backward design" instructional design framework: identify desired
  learning outcomes first, then determine acceptable evidence of achievement, then
  plan instruction. UbD's emphasis on enduring understandings, essential questions,
  and transfer goals aligns directly with LE competency-based design and assessment
  architecture. One of the most widely adopted curriculum design frameworks in K–12
  and higher education, widely referenced in LE instructional design courses.
