significance: >
  Developed a model of strategic help-seeking and avoidance behavior in intelligent
  tutoring systems, showing that students systematically misuse hints (gaming the system
  or help-avoidance). Introduced the help-seeking tutor model and informed subsequent
  ITS designs that explicitly scaffold metacognitive strategies. Foundational for LE
  systems addressing self-regulated learning and learner behavior analytics.
