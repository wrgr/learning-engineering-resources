significance: >
  Argued that the field of learning analytics had drifted toward technical pattern
  detection disconnected from learning theory, calling for learning theory to anchor
  analytics design and interpretation. This intervention directly shaped how LE
  practitioners approach analytics — as theory-driven instruments for improving
  learning, not mere surveillance or performance metrics.
