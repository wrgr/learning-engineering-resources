significance: >
  Examined how shared case stories function as collaborative learning artifacts —
  providing common referents for discussion, enabling analogical transfer, and
  scaffolding group sense-making. Directly relevant to LE design of collaborative
  platforms that use narrative or case-based contexts to anchor group learning
  activities and stimulate productive discourse.
