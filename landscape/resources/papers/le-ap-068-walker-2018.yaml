significance: >
  Reviewed the design space for narrative-centered learning environments (NCLEs),
  where story-driven contexts provide motivation and meaning for learning activities.
  Identified design variables — character agency, story branching, narrative-learning
  integration — and their effects on engagement and learning. Informs LE design for
  game-based and scenario-based learning systems.
