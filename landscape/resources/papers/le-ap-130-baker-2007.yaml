significance: >
  Defined and operationalized "gaming the system" — students exploiting ITS feedback loops
  to advance without learning — and developed detection methods using interaction logs.
  Foundational for LE analytics practitioners designing disengagement detection, identifying
  a critical failure mode of adaptive learning systems.
