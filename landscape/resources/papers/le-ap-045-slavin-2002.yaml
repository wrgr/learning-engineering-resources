significance: >
  Argued for systematic adoption of rigorous evidence standards (randomized experiments,
  replications, effect size reporting) in education, modeled on evidence-based medicine.
  Slavin's framework directly shaped the IES What Works Clearinghouse, evidence
  standards in education research, and LE's commitment to empirical validation
  of instructional interventions. Essential context for LEBOK KA10 (Evaluation) and
  KA11 (Research Methods).
