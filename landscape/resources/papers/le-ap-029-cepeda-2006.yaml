citation_count_approx: 2400
significance: >
  Quantitative meta-analysis of 254 studies demonstrating that distributed (spaced)
  practice produces superior long-term retention compared to massed practice. Established
  the optimal spacing function for study intervals and provided the empirical foundation
  for spaced repetition algorithms in LE systems. The most comprehensive quantitative
  treatment of the spacing effect, informing adaptive scheduling in intelligent tutoring
  and learning management systems.
