significance: >
  Comprehensive review of worked example research synthesizing instructional principles
  for optimizing example-based learning: completion problems, self-explanation prompts,
  example variability, and fading strategies. Directly informs LE system design for
  tutoring systems that use worked examples as primary instructional content, including
  adaptive fading strategies as learners progress from novice to expert.
