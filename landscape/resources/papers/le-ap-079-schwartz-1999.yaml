significance: >
  Proposed a two-dimensional framework for assessing transfer — efficiency on routine
  tasks versus preparation for future learning (PFL) — challenging single-metric
  evaluation. Argued that standard transfer tests miss the crucial outcome of being
  ready to learn new material efficiently. Directly influenced LE evaluation design
  and the concept of "transfer-appropriate processing" in LE system assessments.
