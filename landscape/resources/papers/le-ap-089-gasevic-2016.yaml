significance: >
  Applied learning analytics to examine the relationship between MOOC learner behavior
  patterns (temporal regularity, resource access sequences) and learning outcomes,
  finding that regularity of study and active engagement with formative assessments
  predicted performance. Demonstrates the LE use case of behavioral analytics for
  predicting at-risk learners and guiding adaptive interventions at scale.
