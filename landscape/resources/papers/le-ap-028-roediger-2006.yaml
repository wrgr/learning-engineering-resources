significance: >
  Demonstrated experimentally that repeated retrieval practice produces substantially
  better long-term retention than repeated study — the "testing effect." This work
  directly underpins formative assessment design in LE systems, supporting frequent
  low-stakes quizzing as a core instructional mechanism rather than a mere measurement
  tool. One of the most replicated findings in cognitive psychology.
