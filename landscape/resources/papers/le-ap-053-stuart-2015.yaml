significance: >
  Addressed the generalizability (external validity) problem in randomized educational
  trials — when RCT results from a specific sample cannot be assumed to transfer to
  broader populations. Provided statistical methods for estimating treatment effects
  in target populations using propensity score weighting. Directly relevant to LE
  evaluation practitioners who must assess whether efficacy evidence from controlled
  studies applies to their deployment contexts.
