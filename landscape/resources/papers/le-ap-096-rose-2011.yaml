significance: >
  Developed an agile methodology for dynamically adapting AI-facilitated collaboration
  support based on real-time analysis of student group interactions. Demonstrated that
  just-in-time adaptive interventions improved collaborative learning quality compared to
  static scaffolds, informing LE system design for adaptive group learning.
