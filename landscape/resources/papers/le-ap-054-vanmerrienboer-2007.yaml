significance: >
  Presented the Four-Component Instructional Design (4C/ID) model for designing complex
  skill training: learning tasks, supportive information, procedural information, and
  part-task practice. The model provides an integrated framework for whole-task practice
  design that prevents fragmentation of complex skills, directly applicable to LE system
  design for professional training, technical skills, and competency-based curricula.
