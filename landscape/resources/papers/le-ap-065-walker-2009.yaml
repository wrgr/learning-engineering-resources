significance: >
  Designed and evaluated an adaptive ITS overlay for peer tutoring in computer science
  that monitored peer interactions and intervened with adaptive support. Demonstrated
  that adaptive support during peer tutoring improved both learning outcomes and
  collaborative skill development. Foundational for LE systems that combine peer
  learning with AI scaffolding.
