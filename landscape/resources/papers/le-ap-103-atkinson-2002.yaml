significance: >
  Demonstrated that animated pedagogical agents providing worked-example explanations
  improved geometry problem-solving learning compared to text-only examples. Established
  conditions under which embodied agents add value to worked-example instruction,
  informing LE system design for agent-based tutoring and multimedia learning.
