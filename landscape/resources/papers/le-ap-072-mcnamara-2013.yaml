significance: >
  Described Coh-Metrix, a computational tool that analyzes text cohesion, readability,
  and discourse structure using over 100 linguistic indices. Enables automated matching
  of text complexity to learner level and evaluation of student-generated text for
  coherence. Widely used in LE research for automated text analysis, readability
  assessment, and natural language generation evaluation.
