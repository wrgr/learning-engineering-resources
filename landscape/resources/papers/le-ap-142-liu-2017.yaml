  Applied learning analytics to characterize how different student engagement patterns in MIT
  MOOCs relate to performance outcomes, using clickstream and video-interaction data at scale.
  Demonstrates the MIT LEAP approach of combining systems engineering methods with educational
  data mining to inform evidence-based redesign of large-enrollment digital courses.
