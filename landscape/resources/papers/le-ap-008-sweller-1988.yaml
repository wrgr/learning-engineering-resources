significance: >
  The founding paper of Cognitive Load Theory. Established that working memory limitations
  impose hard constraints on instruction design. CLT-derived principles (worked examples,
  split-attention, redundancy) are among the most widely replicated findings in educational
  psychology and are standard design rules in learning engineering.
