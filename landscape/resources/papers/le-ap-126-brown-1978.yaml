significance: >
  Introduced the "buggy algorithm" concept — systematic procedural errors
  resulting from corrupted or missing knowledge — and demonstrated automated
  diagnosis of student subtraction bugs. Foundational to the diagnostic
  modeling tradition in ITS, knowledge component analysis, and LE approaches
  to formative assessment that identify specific misconceptions rather than
  just correct/incorrect performance.
