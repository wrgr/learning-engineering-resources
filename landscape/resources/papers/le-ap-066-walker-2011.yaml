significance: >
  Synthesized research at the intersection of intelligent tutoring and collaborative
  learning, identifying when and how AI support enhances versus disrupts productive
  collaboration. Provides LE designers with a framework for calibrating AI intervention
  thresholds in peer-learning contexts to maintain collaborative dynamics while
  preventing unproductive struggle.
