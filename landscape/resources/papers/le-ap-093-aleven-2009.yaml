significance: >
  Introduced the example-tracing tutoring paradigm and the Cognitive Tutor Authoring Tools
  (CTAT), allowing non-programmers to build functional ITSs by demonstrating worked example
  solutions rather than coding production rules. Democratized ITS development and directly
  enabled broader LE system deployment by reducing authoring barriers.
