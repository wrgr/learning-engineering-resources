significance: >
  Examined design principles for AI-supported collaborative discourse that fosters
  productive argumentation and knowledge co-construction. Identified key features of
  learning environment design — role assignment, discourse scaffolds, adaptive prompts —
  that promote academically productive talk. Relevant to LE design of online discussion
  platforms and AI-mediated collaborative learning tools.
