tier: foundational
citation_count_approx: 6800
significance: >
  Argued from cognitive load theory and empirical evidence that minimally guided
  instructional approaches (discovery learning, inquiry-based, pure problem-based)
  are less effective than explicit instruction, particularly for novice learners.
  Ignited one of educational psychology's most productive debates and directly
  influenced LE instructional design principles around scaffolding, worked examples,
  and the novice-expert continuum. Understanding this debate is prerequisite to
  principled instructional design decisions in LE systems.
