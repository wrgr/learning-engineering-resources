doi: "10.4018/IJGBL.2017010103"
tier: contemporary
citation_count_approx: 310
significance: >
  Reported a large-scale study showing that a decimal-operations game (Decimal Point)
  produced better learning and retention than a conventional tutoring system for
  middle-school mathematics. One of the stronger causal evaluations of game-based
  learning, addressing validity threats that plague most GBL research. Provides LE
  practitioners with a methodological model for rigorous game-based learning evaluation.
