significance: >
  Identified the five core components of effective teamwork — team leadership, mutual
  performance monitoring, backup behavior, adaptability, and team orientation — supported
  by shared mental models, mutual trust, and closed-loop communication. Provides a
  validated framework for designing and evaluating team-based LE systems, particularly
  in professional and healthcare training contexts.
