significance: >
  Examined educational, social, and technological affordances that enable or constrain
  computer-supported collaborative learning. Introduced the concept of "shared
  epistemic agency" in CSCL environments and identified design principles for
  technology that genuinely supports knowledge co-construction rather than
  incidental co-presence. Foundational for LE design of collaborative digital
  learning environments.
