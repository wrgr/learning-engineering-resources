significance: >
  Described AutoTutor's architecture for mixed-initiative conversational tutoring, using
  latent semantic analysis to assess learner responses and generate Socratic dialogue.
  Demonstrated learning gains comparable to human tutoring in controlled studies. Established
  the conversational ITS paradigm that prefigured modern LLM-based tutoring, directly
  relevant to LE system design for dialogue-based adaptive learning.
