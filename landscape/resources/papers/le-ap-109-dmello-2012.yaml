significance: >
  Mapped the temporal flow of learner affect during complex learning tasks, showing that cycles
  of confusion, frustration, and re-engagement are characteristic of productive deep learning.
  Provides the empirical foundation for affect-aware tutoring systems that respond to
  emotional-cognitive states, informing LE system design for engagement monitoring.
