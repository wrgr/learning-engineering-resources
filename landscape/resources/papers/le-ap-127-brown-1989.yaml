significance: >
  Argued that knowledge is inseparable from the activity, context, and culture
  in which it is learned and used — the foundational paper for situated
  learning theory. Directly challenged decontextualized drill-and-practice
  designs and influenced LE design of authentic, contextualized learning
  activities and problem scenarios.
