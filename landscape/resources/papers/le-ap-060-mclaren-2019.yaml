tier: contemporary
citation_count_approx: 260
significance: >
  Reported a controlled study showing digital game practice produced stronger long-term
  retention and transfer of fractions knowledge than textbook practice in young learners.
  Addresses key threats to validity (engagement confounds) and provides LE practitioners
  with evidence for age-appropriate game-based learning design.
