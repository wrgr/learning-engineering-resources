significance: >
  Introduced Cognitive Load Theory, demonstrating that problem-solving search
  imposes extraneous cognitive load that interferes with schema acquisition.
  Proposed worked examples as a means of reducing extraneous load. The seminal
  paper launching CLT, which became the dominant theoretical framework for
  instructional design in LE systems.
