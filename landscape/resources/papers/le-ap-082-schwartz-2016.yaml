significance: >
  Synthesized research on productive agency — the idea that learners who generate,
  explore, and invent (rather than passively receive instruction) develop more robust
  and transferable knowledge. Integrated findings from invention tasks, desirable
  difficulties, and productive failure into an accessible framework for instructional
  designers. Directly relevant to LE system design for generative and agentic learning.
