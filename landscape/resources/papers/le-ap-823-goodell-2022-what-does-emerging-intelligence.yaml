significance: >
  The emergence of an intelligence augmentation economy will fundamentally change the nature
  of work and what people need to learn and do to be its contributors and beneficiaries.
  This paper explores what this means for the science and practice of human
  factors/ergonomics design and engineering as well as how we teach it.
