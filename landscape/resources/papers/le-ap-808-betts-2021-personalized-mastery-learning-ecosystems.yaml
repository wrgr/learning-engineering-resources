significance: >
  Abstract Adaptive instructional systems (AISs) hold tremendous promise for addressing
  learner variability at scale. Many AISs are grounded in Benjamin Bloom’s (1971) Mastery
  Learning approach, which delivers differentiated instruction, appropriate scaffolding, and
  feedback to ensure each child masters each concept or skill before moving on.
