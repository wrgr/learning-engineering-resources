significance: >
  Demonstrated through a series of experiments that having students invent solutions
  to statistical problems before receiving instruction produced better preparation for
  future learning — even when invention groups scored lower on immediate transfer tests.
  Established "invention as preparation" as a robust instructional strategy, providing
  empirical grounding for exploratory-then-instruction sequences in LE system design.
