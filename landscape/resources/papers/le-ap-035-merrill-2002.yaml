significance: >
  Synthesized five instructional design theories into first principles: problem-centered
  instruction, activation of prior experience, demonstration of new knowledge, application
  with feedback, and integration into real-world tasks. Merrill's framework provides a
  theory-neutral checklist for evaluating any LE instructional approach and is directly
  applicable to LE system design across domains — particularly useful for gap analysis
  in instructional evaluation (LEBOK KA5/KA6).
