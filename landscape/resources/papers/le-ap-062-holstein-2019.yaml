significance: >
  Demonstrated a participatory design process for AI-supported classroom orchestration,
  emphasizing human-AI complementarity rather than substitution. Findings highlight
  how teacher agency must be preserved in AI-augmented classrooms. Directly relevant
  to LE system design for human-in-the-loop learning environments and responsible
  deployment of AI in educational contexts.
