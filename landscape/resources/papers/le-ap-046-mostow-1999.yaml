tier: highly_cited
citation_count_approx: 480
significance: >
  Analyzed the differential impact of tutor help and praise in Project LISTEN's automated
  reading tutor, using controlled experiments to disentangle intervention effects on oral
  reading fluency. Demonstrated that targeted help (not just encouragement) drives measurable
  gains. Methodologically significant for LE evaluation design — particularly for isolating
  component effects in complex ITS interventions.
