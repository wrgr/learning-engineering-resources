title: "Giving Help and Praise in Project LISTEN's Reading Tutor — Which Contributes More to Learning?"
authors:
  - Jack Mostow
  - Gregory Aist
year: 2001
venue: Journal of Educational Computing Research
volume: "25"
issue: "4"
pages: "403–426"
