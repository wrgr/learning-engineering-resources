significance: >
  Meta-analysis across hundreds of studies demonstrating consistent positive effects of
  computer-based instruction on learning outcomes. Established the evidentiary baseline
  that technology-enhanced instruction works, and identified moderating variables (feedback
  timing, pacing control) that predict effect size — directly informing LE evaluation design.
