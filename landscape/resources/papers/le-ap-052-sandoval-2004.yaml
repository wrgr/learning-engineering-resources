significance: >
  Introduced conjecture mapping as a methodological framework for design-based research,
  requiring explicit articulation of theoretical conjectures, designed features,
  mediating processes, and outcomes. Provides LE researchers with a systematic approach
  for designing iterative interventions that build theoretical knowledge alongside
  practical improvements — directly applicable to LE system development and the
  continuous improvement cycle in LEBOK KA10.
