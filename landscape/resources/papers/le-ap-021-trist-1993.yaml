significance: >
  Foundational text of sociotechnical systems theory. Established that optimizing either
  the social or technical subsystem in isolation produces suboptimal outcomes — a principle
  directly governing LE system design. Learning engineering's treatment of technology,
  pedagogy, and human factors as jointly-optimized systems derives from this lineage.
