significance: >
  Described the original prototype of Project LISTEN's automated reading tutor that used
  speech recognition to listen to children read aloud and provide real-time corrective
  feedback. The first system to apply automated speech recognition to reading instruction
  at scale, establishing the paradigm for listening-based literacy ITS.
