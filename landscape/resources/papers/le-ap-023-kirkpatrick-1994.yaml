significance: >
  Established the four-level evaluation model (reaction, learning, behavior, results) that
  became the dominant framework for assessing training effectiveness worldwide. LE evaluation
  frameworks are largely built on or in response to Kirkpatrick — understanding it is
  prerequisite to LEBOK KA10 (Evaluation and Continuous Improvement).
