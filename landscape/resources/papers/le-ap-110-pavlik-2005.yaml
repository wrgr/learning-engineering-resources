significance: >
  Derived a quantitative activation-based model of how practice and forgetting interact to
  produce the spacing effect, fitting ACT-R memory parameters to vocabulary learning data.
  Provided the computational foundation for principled adaptive spacing algorithms in LE
  systems, directly informing models like ACT-R-based intelligent tutors and SuperMemo.
