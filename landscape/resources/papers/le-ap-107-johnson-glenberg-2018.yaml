significance: >
  Proposed and validated two heuristics for designing mixed-reality STEM labs — embodied
  congruence (physical actions match concept structure) and agentive interaction (learners cause
  learning-relevant events). Provides empirically grounded design guidance for LE practitioners
  developing XR-based science curricula.
