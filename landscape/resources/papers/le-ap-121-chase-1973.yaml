significance: >
  Demonstrated through memory experiments that chess masters' superiority is due
  to recognition of thousands of meaningful chunk patterns rather than deeper
  look-ahead — establishing "chunking" as a fundamental cognitive mechanism.
  This expertise/chunking model directly informed intelligent tutoring system
  design, knowledge component modeling, and LE theories of expert performance.
