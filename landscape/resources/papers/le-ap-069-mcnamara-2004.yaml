significance: >
  Described iSTART (Interactive Strategy Training for Active Reading and Thinking), an
  automated web-based system that teaches reading comprehension strategies through
  modeling, practice, and feedback. Demonstrated that automated delivery of
  self-explanation training improved reading comprehension comparably to human-led
  instruction. Established the paradigm for automated reading strategy tutoring that
  influenced Writing Pal and subsequent literacy-domain LE systems.
