significance: >
  Evaluated Writing Pal, an ITS for college-level writing that combines strategy
  instruction, game-based practice, and automated essay scoring. RCT results showed
  significant writing quality gains for students receiving strategy instruction with
  automated feedback. Demonstrates LE evaluation methodology for complex writing-domain
  systems and the importance of combining automated assessment with deliberate practice.
