significance: >
  Critically examined the equity implications of AI in education, analyzing how AI
  systems can perpetuate or amplify existing disparities through biased training data,
  proxy measures, and inequitable deployment contexts. Provides an equity-centered
  framework for LE practitioners evaluating AI-mediated learning systems, directly
  relevant to responsible LE system design and evaluation (LEBOK KA12).
