significance: >
  The National Academies synthesis of cognitive science, neuroscience, and educational
  research that established how people learn: prior knowledge activation, deep conceptual
  understanding over facts, metacognitive monitoring, and transfer-ready knowledge
  structures. One of the most cited education texts of the modern era, directly
  informing the theoretical foundations of learning engineering and the design of
  LE systems that support durable, transferable learning.
