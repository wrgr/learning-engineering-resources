significance: >
  The ActiveAI project addresses key challenges in AI education for grades 7-9 students by
  providing an engaging AI literacy learning experience based on the AI4K12 knowledge
  framework. Utilizing learning science mechanisms such as goal-based scenarios, immediate
  feedback, project-based learning, and intelligent agents, the app incorporates a variety
  of learner inputs like sliders, steppers, and collectors to enhance understanding.
