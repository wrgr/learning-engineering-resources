tier: contemporary
citation_count_approx: 95
significance: >
  Investigated how different types of hints (immediate, on-demand, explanatory) affect
  learning during web-based homework in chemistry. Found that explanation-level hints
  produced greater learning than answer-level hints for low-prior-knowledge students.
  Informs LE system design decisions about hint architecture and the appropriate level
  of scaffolding detail for different learner populations.
