significance: >
  Surveyed conversational ITS systems (AutoTutor, Why2-Atlas, CIRCSIM-Tutor) and identified
  common dialogue strategies — expectation failure, Socratic questioning, anchored feedback —
  that produce learning gains in text-based tutoring. Established the design vocabulary for
  conversational tutoring that underpins modern LLM-based tutoring systems.
