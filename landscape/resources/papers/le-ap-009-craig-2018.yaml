significance: >
  Synthesized human-factors engineering principles for designing pedagogical agents. Showed
  that voice, appearance, and persona of virtual instructors systematically affect learner
  cognitive load and perceived credibility — establishing that LE must integrate psychological
  design alongside algorithmic design.
